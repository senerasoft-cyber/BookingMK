services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: maceda
      POSTGRES_PASSWORD: maceda
      POSTGRES_DB: maceda_booking
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maceda -d maceda_booking"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
