[tool.ruff]
line-length = 100
target-version = "py312"
extend-exclude = ["migrations/versions"]

[tool.ruff.lint]
select = ["E", "F", "I", "W"]

[tool.ruff.lint.per-file-ignores]
"app/business_types.py" = ["E501"]

[tool.black]
line-length = 100
target-version = ["py312"]
extend-exclude = "migrations/versions"

[tool.pytest.ini_options]
pythonpath = ["."]
